spring.application.name=doacoes-service
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/doacoes_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:doari}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:doari}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

notificacao.service.url=${NOTIFICACAO_SERVICE_URL:http://localhost:8083}
notificacao.internal-token=${NOTIFICACAO_INTERNAL_TOKEN:doari-internal-dev-token}

jwt.secret=${JWT_SECRET:doari-dev-secret-change-me-please-32chars}
