spring.application.name=usuarios-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/usuarios_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:doari}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:doari}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:doari-dev-secret-change-me-please-32chars}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
